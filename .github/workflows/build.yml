name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inspect ZIP contents
        run: |
          echo "=== ZIP CONTENTS ==="
          unzip -l WorldDSPPlayer_v3.zip
          echo "=== UNZIPPING ==="
          unzip -q WorldDSPPlayer_v3.zip
          echo "=== ALL FILES AFTER UNZIP ==="
          find . -type f | grep -v ".git" | sort
