name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip -q WorldDSPPlayer_v3.zip
          echo "=== After unzip ==="
          find . -name "gradlew" -type f

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          chmod +x DSPPlayerV3/gradlew
          cd DSPPlayerV3
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WorldDSPPlayer-v3-debug
          path: DSPPlayerV3/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
