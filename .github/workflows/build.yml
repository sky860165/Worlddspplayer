name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show all files
        run: |
          echo "=== ROOT FILES ==="
          ls -la
          echo "=== ALL FILES ==="
          find . -type f | sort

      - name: Unzip
        run: |
          ZIP=$(find . -name "*.zip" | head -1)
          echo "ZIP: $ZIP"
          unzip -q "$ZIP"
          echo "=== AFTER UNZIP ==="
          find . -type f | sort
