
name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Find and unzip project
        run: |
          ZIP=$(find . -name "*.zip" | head -1)
          if [ -n "$ZIP" ]; then
            echo "Found ZIP: $ZIP"
            unzip -q "$ZIP"
            echo "Unzipped successfully"
            ls -la
          else
            echo "No ZIP found, using root directory"
          fi

      - name: Find gradlew
        run: |
          GRADLEW=$(find . -name "gradlew" | head -1)
          echo "Found gradlew at: $GRADLEW"
          PROJ_DIR=$(dirname "$GRADLEW")
          echo "Project dir: $PROJ_DIR"
          echo "PROJ_DIR=$PROJ_DIR" >> $GITHUB_ENV

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x ${{ env.PROJ_DIR }}/gradlew

      - name: Build Debug APK
        run: |
          cd ${{ env.PROJ_DIR }}
          ./gradlew assembleDebug --stacktrace

      - name: Find APK
        run: |
          APK=$(find . -name "*.apk" | head -1)
          echo "APK found: $APK"
          echo "APK_PATH=$APK" >> $GITHUB_ENV

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorldDSPPlayer-v3-debug
          path: ${{ env.APK_PATH }}
          retention-days: 30
