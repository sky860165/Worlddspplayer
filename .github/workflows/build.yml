name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip -q WorldDSPPlayer_v2.zip

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate gradlew
        run: |
          cd DSPPlayerV2
          gradle wrapper --gradle-version 8.4

      - name: Build Debug APK
        run: |
          cd DSPPlayerV2
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WorldDSPPlayer-debug
          path: DSPPlayerV2/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
